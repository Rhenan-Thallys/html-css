<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parabéns!!</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
        }
        img {
            width: 600px;
            height: 400px;
            margin: 0 auto;
            display: flex;
            transition: 0.5s;
            
        }
        body {
    opacity: 0;
    animation: aparecer 1.5s ease-in-out forwards;
    animation-delay: 0.5s; /* tempo antes de começar */
}

@keyframes aparecer {
    to {
        opacity: 1;
    }
}
    #bg-video {
    position: fixed;      /* fixa no fundo */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;    /* cobre toda a tela */
    z-index: -1;          /* manda pra trás */
}
    p {
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 25px;
        text-wrap: unset;
    }
    </style>
</head>
<body>
    <div id="card">
        <h1>PARABÉNS!!</h1>
    </div>
    <div id="balao">
        <img src="https://i0.wp.com/www.multarte.com.br/wp-content/uploads/2018/12/baloes3.png?resize=3543%2C2069&ssl=1" alt="balao">
    </div>
    <br>
    <p>Que seu dia seja iluminado e cheio de alegria muitos anos de vida e aproveite bastante!</p>
    <video autoplay muted loop id="bg-video">
    <source src="imagens/Colorful Confetti Explosion  Celebration Background Video  Party Effects & Festive Vibes - Green Screen Library (720p, h264, youtube).mp4" type="video/mp4">
</video>
</body>
</html>
