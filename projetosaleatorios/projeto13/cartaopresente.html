<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Presente</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-image: linear-gradient(45deg, black,purple, pink, purple, black);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }

        button{
            margin: 0 auto;
            display: block;
            margin-top: 280px;
            text-align: center;
            border: 1px solid white;
            width: 400px;
            height: 200px;
            padding: 10px;
            background-color: black;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        button a{
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        button:hover {
            background-color: white;
            color: black;
        }
        button:hover a {
            color: black;
        }
    </style>
</head>
<body>
    <form action="" method="post">
        <button><a href="parabens.html">CLIQUE AQUI</a></button>
    </form>
</body>
</html>
