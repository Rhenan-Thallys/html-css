<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de iframe</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: gray;
            color: white;
        }
        iframe#tela{
            width: 600px;
            height: 400px;
            border: 2px solid black;
        }
        a{
            color: white;
            text-decoration: none;
        }
        a:hover{
            text-decoration: underline;

        }
    </style>
</head>
<body>
    <h1>Aprendendo iframe</h1>
    <p>iframe é uma forma de mostrar um outro site dentro do próprio site através de um link.</p>
    <iframe id="tela" src="paginas/pag001.html" name="frame">
        <p>Infelizmente seu site não é compatível com o conteúdo..</p>
    </iframe>
    <h1>Outra forma de iframe:</h1>
    <ul>
        <li><a href="paginas/pag002.html" target="frame">Acessar página02</a></li>
    </ul>
</body>
</html>
