<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            width: 90vh;
            height: 350px;
            border: 1px solid gray;  
            max-height: 600px;
            border-collapse: collapse;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            display: flex;
            margin: 0 auto;
            margin-top: 202px;
            justify-content: center;
            align-content: center;
        }
        tr {
            color: black;
            border: 1px solid black;
        }
        tr:hover {
            background-color: #ddd;
        }
        td , th{
            padding: 10px;
            text-align: left;
            border: 1px solid black;
        }
        .btn {
            padding: 5px;
            cursor: pointer;
        }
        .editar {
            background-color: #4CAF50;
            color: white;
        }
        .excluir {
            background-color: red;
            color: white;
        }
        .ativo {
            background-color: #4CAF50;
            color: white;
            text-align: center;
        }
        .inativo {
            background-color: red;
            color: white;
            text-align: center;
        }
        button {
            border: 1px solid gray;
            
        }
        @media screen and (max-width: 560px){
            table {
                width: 59.4vh;
            }
            button {
                margin-bottom: 5px;
            }
            .editar{
                width: 52.2px;
            }
        }
    </style>
</head>
<body>
        <table>
            <tr>
                <th>Nome:</th>
                <th>E-mail:</th>
                <th>Status:</th>
                <th>Ações:</th>
            </tr>
            <tr>
                <td>João</td>
                <td>joão@email.com</td>
                <td class="ativo">Ativo</td>
                <td>
                    <button class="btn editar">Editar</button>
                    <button class="btn excluir">Excluir</button>
                </td>
            </tr>
            <tr>
                <td>Maria</td>
                <td>Maria@email.com</td>
                <td class="inativo">Inativo</td>
                <td>
                    <button class="btn editar">Editar</button>
                    <button class="btn excluir">Excluir</button>
                </td>
            </tr>
            <tr>
                <td>Pedro</td>
                <td>Pedro@email.com</td>
                <td class="ativo">Ativo</td>
                <td>
                    <button class="btn editar">Editar</button>
                    <button class="btn excluir">Excluir</button>
                </td>
            </tr>
        </table>
</body>
</html>
